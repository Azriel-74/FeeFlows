<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduStack — Student Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/student.css">
</head>
<body>

<!-- ═══ STUDENT AUTH ═══ -->
<div id="s-auth-screen">
  <div class="auth-card" style="max-width:440px">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <div>
        <div class="auth-logo-name">EduStack</div>
        <div class="auth-logo-sub">Student Portal</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchSTab('login',this)">Sign In</button>
      <button class="auth-tab" onclick="switchSTab('register',this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="s-login-form">
      <div class="fg">
        <label>Email</label>
        <input class="fi" type="email" id="sl-email" placeholder="your@email.com">
      </div>
      <div class="fg">
        <label>Password</label>
        <input class="fi" type="password" id="sl-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doStudentLogin()" style="margin-top:4px">Sign In →</button>
    </div>

    <!-- REGISTER -->
    <div id="s-register-form" style="display:none">
      <div class="form-row">
        <div class="fg">
          <label>Full Name *</label>
          <input class="fi" type="text" id="sr-name" placeholder="Your full name">
        </div>
        <div class="fg">
          <label>Phone (optional)</label>
          <input class="fi" type="tel" id="sr-phone" placeholder="+91 98765 43210">
        </div>
      </div>
      <div class="fg">
        <label>Email *</label>
        <input class="fi" type="email" id="sr-email" placeholder="your@email.com">
      </div>
      <div class="fg">
        <label>Password *</label>
        <input class="fi" type="password" id="sr-pass" placeholder="min 6 characters">
      </div>
      <div class="form-row">
        <div class="fg">
          <label>Class *</label>
          <select class="fi" id="sr-class">
            <option value="">Select class</option>
            <option>Class 6</option><option>Class 7</option><option>Class 8</option>
            <option>Class 9</option><option>Class 10</option>
            <option>Class 11</option><option>Class 12</option>
          </select>
        </div>
        <div class="fg">
          <label>Board *</label>
          <select class="fi" id="sr-board">
            <option value="">Select board</option>
            <option>CBSE</option><option>ICSE</option>
            <option>State Board</option><option>IB</option><option>IGCSE</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>School Name (optional)</label>
        <input class="fi" type="text" id="sr-school" placeholder="e.g. Delhi Public School">
      </div>
      <div class="fg">
        <label>Institution ID
          <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted)"> — optional, links you to your coaching centre</span>
        </label>
        <input class="fi" type="text" id="sr-instid" placeholder="e.g. ES-ABC123-4567" style="font-family:monospace;letter-spacing:1px">
        <div style="font-size:12px;color:var(--muted);margin-top:5px">Ask your teacher/admin for this ID. Without it, you still get full access to all study material.</div>
      </div>
      <button class="btn-primary" onclick="doStudentRegister()" style="margin-top:8px">Create Account →</button>
    </div>

    <div style="margin-top:16px;text-align:center">
      <a href="index.html" style="font-size:13px;color:var(--muted);text-decoration:none">← Back to Home</a>
    </div>
  </div>
</div>

<!-- ═══ STUDENT APP ═══ -->
<div id="s-app" style="display:none">

  <!-- Mobile backdrop -->
  <div id="s-backdrop" onclick="closeSidebar()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:290;backdrop-filter:blur(2px)"></div>

  <div id="s-layout">

    <!-- SIDEBAR -->
    <div id="s-sidebar">
      <div class="s-sidebar-top">
        <div class="s-logo">
          <div class="s-logo-icon">🎓</div>
          <div class="s-logo-name">EduStack</div>
        </div>
        <div class="s-student-info">
          <div class="s-student-avatar" id="s-avatar">S</div>
          <div>
            <div class="s-student-name" id="s-name-label">Student</div>
            <div class="s-student-class" id="s-class-label">—</div>
          </div>
        </div>
      </div>

      <div class="s-nav">
        <button class="s-nav-item active" data-page="home" onclick="sNav('home')">
          <span class="s-nav-icon">🏠</span><span class="s-nav-label">Home</span>
        </button>
        <button class="s-nav-item" data-page="payments" onclick="sNav('payments')">
          <span class="s-nav-icon">💳</span><span class="s-nav-label">Payments</span>
        </button>
        <button class="s-nav-item" data-page="attendance" onclick="sNav('attendance')">
          <span class="s-nav-icon">📝</span><span class="s-nav-label">Attendance</span>
        </button>
        <button class="s-nav-item" data-page="assignments" onclick="sNav('assignments')">
          <span class="s-nav-icon">📋</span><span class="s-nav-label">Assignments</span>
        </button>
        <div class="s-nav-section-label">Subjects</div>
        <div id="s-subject-nav"></div>
      </div>

      <div class="s-sidebar-bottom">
        <button class="s-nav-item" onclick="doStudentLogout()">
          <span class="s-nav-icon">🚪</span><span class="s-nav-label">Sign Out</span>
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="s-main">

      <!-- TOP BAR -->
      <div class="s-topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <!-- Hamburger — always visible, always on top -->
          <button id="s-menu-btn" onclick="toggleSSidebar()"
            style="background:var(--surf2);border:1.5px solid var(--border2);border-radius:9px;
                   cursor:pointer;font-size:17px;color:var(--text);padding:6px 10px;
                   display:flex;align-items:center;justify-content:center;
                   min-width:36px;height:36px;position:relative;z-index:400">☰</button>
          <div id="s-page-title" class="s-page-title">Home</div>
        </div>
        <button onclick="toggleTheme();updateSThemeBtn()"
          id="s-theme-btn"
          style="background:var(--surf2);border:1.5px solid var(--border2);border-radius:8px;
                 width:34px;height:34px;cursor:pointer;font-size:16px;
                 display:flex;align-items:center;justify-content:center">☀️</button>
      </div>

      <!-- PAGES -->
      <div id="s-page-home"        class="s-page"></div>
      <div id="s-page-attendance"  class="s-page" style="display:none"></div>
      <div id="s-page-assignments" class="s-page" style="display:none"></div>
      <div id="s-page-subject"     class="s-page" style="display:none"></div>
      <div id="s-page-chapter"     class="s-page" style="display:none"></div>
      <div id="s-page-payments" class="s-page" style="display:none"></div>
      <div id="s-page-quiz"        class="s-page" style="display:none"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<!-- Scripts -->
<script src="js/data/qb_registry.js"></script>
<script src="js/data/class9_physics.js"></script>
<script src="js/data/class9_science.js"></script>
<script src="js/data/class9_maths.js"></script>
<script src="js/data/class9_sst.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/student_auth.js"></script>
<script src="js/student_payments.js"></script>
<script src="js/student_portal.js"></script>
<script type="module" src="js/firebase-init.js"></script>

<script>
// Student sidebar toggle (separate from admin)
function toggleSSidebar() {
  const sb   = document.getElementById("s-sidebar");
  const bd   = document.getElementById("s-backdrop");
  const open = sb.classList.contains("s-open");
  if (open) { sb.classList.remove("s-open"); bd.style.display="none"; }
  else       { sb.classList.add("s-open");   bd.style.display="block"; }
}
function closeSidebar() {
  document.getElementById("s-sidebar")?.classList.remove("s-open");
  const bd = document.getElementById("s-backdrop");
  if (bd) bd.style.display="none";
}
function updateSThemeBtn() {
  const t = document.documentElement.getAttribute("data-theme")||"dark";
  const btn = document.getElementById("s-theme-btn");
  if (btn) btn.textContent = t==="dark"?"☀️":"🌙";
}
document.addEventListener("DOMContentLoaded", ()=>{
  loadTheme();
  updateSThemeBtn();
});
</script>
</body>
</html>
