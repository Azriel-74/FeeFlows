<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduStack — Student Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/student.css">
</head>
<body>

<!-- AUTH -->
<div id="s-auth-wrap" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🎓</div>
      <div>
        <div class="auth-logo-name">EduStack</div>
        <div class="auth-logo-sub">Student Portal</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchSTab('login',this)">Sign In</button>
      <button class="auth-tab" onclick="switchSTab('register',this)">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="s-login-form">
      <div class="fg"><label>Email</label><input class="fi" type="email" id="sl-email" placeholder="you@example.com"></div>
      <div class="fg"><label>Password</label><input class="fi" type="password" id="sl-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="doStudentLogin()">Sign In →</button>
      <div class="auth-divider"><span>or</span></div>
      <button class="btn-offline" onclick="demoStudentLogin()">Continue as Demo Student</button>
    </div>

    <!-- REGISTER -->
    <div id="s-register-form" style="display:none">
      <div class="form-row">
        <div class="fg"><label>Full Name *</label><input class="fi" type="text" id="sr-name" placeholder="Your name"></div>
        <div class="fg"><label>Phone</label><input class="fi" type="text" id="sr-phone" placeholder="+91 …"></div>
      </div>
      <div class="fg"><label>Email *</label><input class="fi" type="email" id="sr-email" placeholder="you@example.com"></div>
      <div class="fg"><label>Password *</label><input class="fi" type="password" id="sr-pass" placeholder="min 6 characters"></div>
      <div class="form-row">
        <div class="fg">
          <label>Class *</label>
          <select class="fi" id="sr-class">
            <option value="">Select</option>
            <option>Class 9</option><option>Class 10</option>
            <option>Class 11</option><option>Class 12</option>
          </select>
        </div>
        <div class="fg">
          <label>Board *</label>
          <select class="fi" id="sr-board">
            <option value="">Select</option>
            <option>CBSE</option><option>ICSE</option><option>State Board</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>School Name</label><input class="fi" type="text" id="sr-school" placeholder="Your school"></div>
      <div class="fg"><label>Institute ID <span style="font-weight:400;text-transform:none">(from your admin)</span></label><input class="fi" type="text" id="sr-instid" placeholder="e.g. ES-2024-001"></div>
      <button class="btn-primary" onclick="doStudentRegister()">Create Account →</button>
    </div>

    <a class="auth-back" href="index.html">← Back to Home</a>
  </div>
</div>

<!-- APP -->
<div id="s-app-wrap" style="display:none">
  <div id="student-app-layout">

    <div id="s-backdrop" onclick="closeSStudentSidebar()"></div>

    <!-- SIDEBAR -->
    <nav id="s-sidebar">
      <div class="s-sidebar-top">
        <div class="s-logo">
          <div class="s-logo-icon">🎓</div>
          <div class="s-logo-name">EduStack</div>
        </div>
        <div class="s-student-info">
          <div class="s-avatar" id="s-avatar">S</div>
          <div>
            <div class="s-student-name" id="s-name-lbl">Student</div>
            <div class="s-student-class" id="s-class-lbl">Class 9 · CBSE</div>
          </div>
        </div>
      </div>

      <div class="s-nav">
        <button class="s-nav-item active" data-spage="home" onclick="sNav('home')">
          <span class="s-nav-icon">🏠</span><span>Home</span>
        </button>
        <button class="s-nav-item" data-spage="payments" onclick="sNav('payments')">
          <span class="s-nav-icon">💳</span><span>My Payments</span>
        </button>
        <button class="s-nav-item" data-spage="attendance" onclick="sNav('attendance')">
          <span class="s-nav-icon">📝</span><span>My Attendance</span>
        </button>

        <div class="s-nav-sep">📚 Subjects</div>
        <div id="s-subject-nav"></div>
      </div>

      <div class="s-sidebar-bottom">
        <button class="btn-logout" style="width:100%" onclick="doStudentLogout()">Sign Out</button>
      </div>
    </nav>

    <!-- MAIN -->
    <div class="s-main">
      <header class="s-topbar">
        <div class="s-topbar-left">
          <button id="s-menu-btn" onclick="toggleSStudentSidebar()">☰</button>
          <span class="s-page-title" id="s-page-title">Home</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="s-theme-btn" onclick="toggleTheme()" title="Toggle theme">☀️</button>
          <a href="index.html" style="font-size:12px;color:var(--muted);font-weight:600">← Home</a>
        </div>
      </header>

      <div class="s-content">
        <!-- HOME -->
        <div class="s-page active" id="s-page-home"></div>
        <!-- PAYMENTS -->
        <div class="s-page" id="s-page-payments"></div>
        <!-- ATTENDANCE -->
        <div class="s-page" id="s-page-attendance"></div>
        <!-- SUBJECT -->
        <div class="s-page" id="s-page-subject"></div>
        <!-- CHAPTER -->
        <div class="s-page" id="s-page-chapter"></div>
        <!-- QUIZ -->
        <div class="s-page" id="s-page-quiz"></div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<script src="js/utils.js"></script>
<script src="js/data/question_bank.js"></script>
<script src="js/student_portal.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', loadTheme);
</script>
</body>
</html>
